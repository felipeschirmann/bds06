version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bds06-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_HUB_USERNAME:-felipeschirmann}/bds06:${IMAGE_TAG:-latest}
    container_name: bds06-app
    ports:
      - "${APP_PORT:-8081}:8080"
    environment:
      APP_PROFILE: ${APP_PROFILE}
      BDS06_DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      BDS06_DATABASE_USERNAME: ${POSTGRES_USER}
      BDS06_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_DURATION: ${JWT_DURATION}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
