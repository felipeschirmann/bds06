name: cd

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Package with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-jar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short git commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/bds06:sha-${{ steps.vars.outputs.sha_short }},${{ secrets.DOCKER_HUB_USERNAME }}/bds06:latest

  deploy:
    name: Deploy to OCI VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short git commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Copy docker-compose-homolog.yml and env file via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "docker-compose-homolog.yml,.env.homolog"
          target: "/home/${{ secrets.ORACLE_SSH_USER }}/bds06"

      - name: Copy Nginx config via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "nginx/bds06.conf"
          target: "/tmp"
          strip_components: 1

      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            docker rm -f bds06-app bds06-postgres || true
            rm -rf /home/${{ secrets.ORACLE_SSH_USER }}/app
            mkdir -p /home/${{ secrets.ORACLE_SSH_USER }}/bds06
            cd /home/${{ secrets.ORACLE_SSH_USER }}/bds06
            sed -i '/^IMAGE_TAG=/d' .env.homolog
            echo "IMAGE_TAG=sha-${{ steps.vars.outputs.sha_short }}" >> .env.homolog
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog pull
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog up -d --force-recreate
            docker image prune -a -f
            sudo mv /tmp/bds06.conf /etc/nginx/conf.d/bds06.conf
            sudo nginx -t && sudo nginx -s reload

